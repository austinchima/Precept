services:
  db:
    image: postgres:18-alpine
    container_name: precept_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Database is only reachable internally by the API. Do not expose to the host.
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./Precept.Api
      dockerfile: Dockerfile
      target: final
    container_name: precept_api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - ConnectionStrings__DefaultConnection=Host=db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}

  web:
    build:
      context: ./Precept.Web
      dockerfile: Dockerfile
      target: final
    container_name: precept_web
    depends_on:
      - api
    ports:
      - "80:80"
    environment:
      - API_TARGET=http://api:8080

volumes:
  postgres_data:
