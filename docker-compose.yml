services:
  db:
    image: postgres:18-alpine
    container_name: precept_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: precept_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d precept_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./Precept.Api
      dockerfile: Dockerfile
      target: dev
    container_name: precept_api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=precept_db;Username=postgres;Password=postgres
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_USE_POLLING_FILE_WATCHER=1

  web:
    build:
      context: ./Precept.Web
      dockerfile: Dockerfile
      target: dev
    container_name: precept_web
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_USE_POLLING=true
      - API_TARGET=http://api:8080

volumes:
  postgres_data:
