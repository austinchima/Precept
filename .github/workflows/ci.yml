name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: precept_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d precept_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ConnectionStrings__PreceptDb: "Host=localhost;Port=5432;Username=postgres;Password=postgres;Database=precept_test"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "trx" --results-directory "TestResults"

      # OWASP A06: Scan for vulnerable NuGet packages
      - name: Scan for vulnerable NuGet packages
        run: dotnet list package --vulnerable --include-transitive

  # OWASP A06: Scan npm dependencies for the web frontend
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./Precept.Web
        run: npm ci

      - name: Run npm audit
        working-directory: ./Precept.Web
        run: npm audit --audit-level=moderate

      - name: Build frontend
        working-directory: ./Precept.Web
        run: npm run build
