name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      TEST_DB_USER: postgres
      TEST_DB_NAME: precept_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate ephemeral test database password
        id: db-password
        run: |
          PASSWORD=$(openssl rand -hex 32)
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Start PostgreSQL service
        uses: ikalnytskyi/action-setup-postgres@v6
        with:
          username: ${{ env.TEST_DB_USER }}
          password: ${{ steps.db-password.outputs.password }}
          database: ${{ env.TEST_DB_NAME }}
          port: 5432

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore
        env:
          ConnectionStrings__PreceptDb: "Host=localhost;Port=5432;Username=${{ env.TEST_DB_USER }};Password=${{ steps.db-password.outputs.password }};Database=${{ env.TEST_DB_NAME }}"

      - name: Build
        run: dotnet build --configuration Release --no-restore
        env:
          ConnectionStrings__PreceptDb: "Host=localhost;Port=5432;Username=${{ env.TEST_DB_USER }};Password=${{ steps.db-password.outputs.password }};Database=${{ env.TEST_DB_NAME }}"

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "trx" --results-directory "TestResults"
        env:
          ConnectionStrings__PreceptDb: "Host=localhost;Port=5432;Username=${{ env.TEST_DB_USER }};Password=${{ steps.db-password.outputs.password }};Database=${{ env.TEST_DB_NAME }}"

      # OWASP A06: Scan for vulnerable NuGet packages
      - name: Scan for vulnerable NuGet packages
        run: dotnet list package --vulnerable --include-transitive

  # OWASP A06: Scan npm dependencies for the web frontend
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./Precept.Web
        run: npm ci

      - name: Run npm audit
        working-directory: ./Precept.Web
        run: npm audit --audit-level=moderate

      - name: Build frontend
        working-directory: ./Precept.Web
        run: npm run build
